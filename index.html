<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="apple-touch-icon" sizes="152x152" href="icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-192.png">
<link rel="apple-touch-icon" sizes="167x167" href="icon-192.png">
<link rel="apple-touch-startup-image" href="icon-512.png">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Whose Next?">
<meta name="theme-color" content="#08080f">
<title>Whose Next?</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* ===================== RESET & BASE ===================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #08080f;
  --surface: #10101a;
  --surface2: #18182a;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f0ff;
  --muted: #4a4a6a;
  --muted2: #6a6a8a;
  --purple: #7c3aed;
  --purple2: #a855f7;
  --purple3: #c084fc;
  --glow: rgba(124,58,237,0.35);

  /* safe areas */
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
}

html {
  height: 100%;
  height: -webkit-fill-available;
}
body {
  width: 100%;
  height: 100%;
  height: -webkit-fill-available;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* ===================== SCREENS ===================== */
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
  will-change: opacity, transform;
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.screen.hidden {
  opacity: 0;
  pointer-events: none;
  transform: translateY(16px);
}
.screen.slide-left {
  transform: translateX(-20px);
}

/* ===================== SPLASH ===================== */
#splash {
  background: radial-gradient(ellipse at 50% 60%, rgba(124,58,237,0.18) 0%, transparent 65%), var(--bg);
  justify-content: center;
  align-items: center;
  padding: 0 32px;
  padding-top: var(--sat);
  padding-bottom: calc(var(--sab) + 20px);
  gap: 0;
}

.splash-logo-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1;
  justify-content: center;
  gap: 24px;
  width: 100%;
}

.splash-icon {
  width: clamp(120px, 32vw, 180px);
  height: clamp(120px, 32vw, 180px);
  border-radius: 36px;
  overflow: hidden;
  box-shadow: 0 0 60px rgba(124,58,237,0.5), 0 0 120px rgba(124,58,237,0.15);
  animation: icon-float 3s ease-in-out infinite;
  flex-shrink: 0;
}
.splash-icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
@keyframes icon-float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
}

.splash-wordmark {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: clamp(32px, 9vw, 52px);
  letter-spacing: -1.5px;
  text-align: center;
  line-height: 1;
  color: var(--text);
}
.splash-wordmark span {
  color: var(--purple3);
}
.splash-tagline {
  font-size: clamp(13px, 3.5vw, 16px);
  color: var(--muted2);
  text-align: center;
  letter-spacing: 0.3px;
  margin-top: -8px;
}

.splash-footer {
  width: 100%;
  max-width: 380px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  padding-bottom: 8px;
}

.btn-play {
  width: 100%;
  padding: 18px 24px;
  border-radius: 18px;
  border: none;
  background: var(--purple);
  color: #fff;
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 800;
  letter-spacing: 0.5px;
  cursor: pointer;
  box-shadow: 0 4px 30px rgba(124,58,237,0.5);
  transition: transform 0.12s, box-shadow 0.12s;
  position: relative;
  overflow: hidden;
}
.btn-play::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.15), transparent 60%);
  pointer-events: none;
}
.btn-play:active {
  transform: scale(0.97);
  box-shadow: 0 2px 16px rgba(124,58,237,0.4);
}

.splash-hint {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

/* ===================== ONBOARDING ===================== */
#onboarding {
  background: var(--bg);
  justify-content: flex-start;
  overflow: hidden;
}

.ob-topbar {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: calc(var(--sat) + 16px) 20px 16px;
  flex-shrink: 0;
}
.back-pill {
  background: var(--surface);
  border: 1.5px solid var(--border2);
  border-radius: 10px;
  padding: 8px 16px;
  color: var(--text);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
}
.back-pill:active { opacity: 0.7; }
.ob-topbar-title {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 800;
  color: var(--text);
  flex: 1;
}

/* Type selector */
.type-tabs {
  display: flex;
  gap: 6px;
  padding: 0 20px 12px;
  width: 100%;
  flex-shrink: 0;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.type-tabs::-webkit-scrollbar { display: none; }
.type-tab {
  padding: 9px 18px;
  border-radius: 99px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--muted2);
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  flex-shrink: 0;
}
.type-tab.active {
  border-color: var(--purple3);
  color: var(--purple3);
  background: rgba(192,132,252,0.08);
}

/* Pack list */
.pack-scroll {
  flex: 1;
  width: 100%;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 4px 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.pack-scroll::-webkit-scrollbar { width: 0; }

.pack-section-label {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 12px 0 4px;
}

.pack-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 16px 18px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, transform 0.1s;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  gap: 14px;
}
.pack-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--pack-color, transparent);
  border-radius: 3px 0 0 3px;
}
.pack-card:active { transform: scale(0.985); }
.pack-card.selected {
  border-color: var(--pack-color, var(--purple));
  background: var(--surface2);
}
.pack-card-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--pack-color, var(--muted));
  flex-shrink: 0;
  opacity: 0.7;
}
.pack-card.selected .pack-card-dot { opacity: 1; }
.pack-card-body { flex: 1; min-width: 0; }
.pack-name {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.3px;
}
.pack-desc {
  font-size: 12px;
  color: var(--muted2);
  margin-top: 3px;
  line-height: 1.4;
}
.pack-check {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--pack-color, var(--purple));
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 800;
  color: #fff;
  flex-shrink: 0;
}
.pack-card.selected .pack-check { display: flex; }

.ob-footer {
  width: 100%;
  padding: 14px 20px;
  padding-bottom: calc(var(--sab) + 14px);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
  background: var(--bg);
}
.ob-footer-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.ob-custom-link {
  font-size: 13px;
  color: var(--muted2);
  cursor: pointer;
}
.ob-custom-link span { color: var(--purple3); }
.btn-start {
  width: 100%;
  padding: 16px;
  border-radius: 16px;
  border: none;
  background: var(--purple);
  color: #fff;
  font-family: 'Syne', sans-serif;
  font-size: 17px;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 4px 24px rgba(124,58,237,0.45);
  transition: transform 0.1s, opacity 0.1s;
  letter-spacing: 0.3px;
  position: relative;
  overflow: hidden;
}
.btn-start::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.12), transparent 60%);
  pointer-events: none;
}
.btn-start:active { transform: scale(0.97); }
.btn-start:disabled { opacity: 0.25; pointer-events: none; }

/* ===================== CUSTOM SCREEN ===================== */
#custom-screen {
  background: var(--bg);
  justify-content: flex-start;
}
.cs-topbar {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: calc(var(--sat) + 16px) 20px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.cs-title {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 800;
  flex: 1;
}
.type-tabs-sm {
  display: flex;
  gap: 6px;
  padding: 12px 20px 8px;
  width: 100%;
  flex-shrink: 0;
}
.type-tab-sm {
  padding: 7px 16px;
  border-radius: 99px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--muted2);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.type-tab-sm.active { border-color: var(--purple3); color: var(--purple3); }
.cs-list {
  flex: 1;
  overflow-y: auto;
  width: 100%;
  padding: 8px 20px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.cs-list::-webkit-scrollbar { width: 0; }
.cs-item {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 13px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: fadeUp 0.2s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}
.cs-item-text { flex: 1; font-size: 14px; line-height: 1.4; }
.cs-del { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 2px 6px; transition: color 0.15s; }
.cs-del:active { color: #ef4444; }
.cs-empty { text-align: center; color: var(--muted2); font-size: 14px; padding: 40px 0; line-height: 2; }
.cs-input-row {
  width: 100%;
  padding: 12px 20px;
  padding-bottom: calc(var(--sab) + 12px);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  flex-shrink: 0;
  background: var(--bg);
}
.cs-input {
  flex: 1;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  color: var(--text);
  font-size: 15px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}
.cs-input:focus { border-color: var(--purple3); }
.cs-input::placeholder { color: var(--muted); }
.cs-add-btn {
  background: var(--purple);
  border: none;
  border-radius: 12px;
  width: 48px; height: 48px;
  font-size: 24px;
  color: #fff;
  font-weight: 800;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: transform 0.1s;
}
.cs-add-btn:active { transform: scale(0.9); }

/* ===================== PLAY SCREEN ===================== */
#play-screen {
  background: var(--bg);
  padding: 0;
}

#fluid-canvas {
  position: absolute; inset: 0;
  z-index: 0;
  opacity: 0;
  transition: opacity 1.5s ease;
  pointer-events: none;
}
#fluid-canvas.show { opacity: 1; }

.play-topbar {
  position: relative;
  z-index: 10;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: calc(var(--sat) + 14px) 20px 10px;
  flex-shrink: 0;
}
.play-home-btn {
  background: rgba(255,255,255,0.09);
  border: 1.5px solid rgba(255,255,255,0.14);
  border-radius: 10px;
  padding: 9px 18px;
  color: var(--text);
  font-size: 14px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
}
.play-home-btn:active { background: rgba(255,255,255,0.16); }
.play-pack-name {
  font-size: 11px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--muted2);
}
.play-custom-btn {
  background: rgba(255,255,255,0.06);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 9px 14px;
  color: var(--muted2);
  font-size: 13px;
  cursor: pointer;
}

/* Full-screen touch zone */
#touch-area {
  position: relative;
  z-index: 5;
  flex: 1;
  width: 100%;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.touch-hint {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  pointer-events: none;
  transition: opacity 0.4s;
  text-align: center;
  padding: 0 40px;
}
.touch-hint-rule {
  width: 32px; height: 1px;
  background: rgba(255,255,255,0.12);
}
.touch-hint-text {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--muted);
}

/* ---- DOTS ---- */
.tdot {
  position: absolute;
  transform: translate(-50%,-50%);
  pointer-events: none;
  will-change: transform;
}
.tdot-outer, .tdot-ring, .tdot-core { 
  position: absolute;
  border-radius: 50%;
  transform: translate(-50%,-50%);
  top: 50%; left: 50%;
}

/* IDLE */
.tdot.idle .tdot-outer {
  width: 90px; height: 90px;
  border: 1px solid rgba(255,255,255,0.06);
  animation: idle-outer 2.5s ease-in-out infinite;
}
.tdot.idle .tdot-ring {
  width: 64px; height: 64px;
  border: 1.5px solid rgba(255,255,255,0.2);
  animation: idle-ring 2.5s ease-in-out infinite;
}
.tdot.idle .tdot-core {
  width: 36px; height: 36px;
  background: rgba(255,255,255,0.15);
  animation: idle-core 2.5s ease-in-out infinite;
}
@keyframes idle-outer {
  0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 0.4; }
  50% { transform: translate(-50%,-50%) scale(1.12); opacity: 0.7; }
}
@keyframes idle-ring {
  0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 0.6; }
  50% { transform: translate(-50%,-50%) scale(1.08); opacity: 1; }
}
@keyframes idle-core {
  0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 0.6; }
  50% { transform: translate(-50%,-50%) scale(1.1); opacity: 0.9; }
}

/* SPINNING */
.tdot.spinning .tdot-outer {
  width: 96px; height: 96px;
  border: 1px solid rgba(255,255,255,0.1);
  animation: spin-outer 0.9s ease-in-out infinite alternate;
}
.tdot.spinning .tdot-ring {
  width: 68px; height: 68px;
  border: 2px solid rgba(255,255,255,0.35);
  animation: spin-ring 0.5s ease-in-out infinite alternate;
}
.tdot.spinning .tdot-core {
  width: 40px; height: 40px;
  background: rgba(255,255,255,0.25);
  animation: spin-core 0.5s ease-in-out infinite alternate;
}
@keyframes spin-outer {
  from { transform: translate(-50%,-50%) scale(0.95); }
  to { transform: translate(-50%,-50%) scale(1.1); }
}
@keyframes spin-ring {
  from { transform: translate(-50%,-50%) scale(0.9); opacity: 0.5; }
  to { transform: translate(-50%,-50%) scale(1.08); opacity: 1; }
}
@keyframes spin-core {
  from { transform: translate(-50%,-50%) scale(0.85); }
  to { transform: translate(-50%,-50%) scale(1.05); }
}

/* HIGHLIGHT — clearly visible cycling */
.tdot.highlight .tdot-outer {
  width: 110px; height: 110px;
  border: 2px solid rgba(168,85,247,0.6);
  animation: hl-outer 0.2s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
.tdot.highlight .tdot-ring {
  width: 78px; height: 78px;
  border: 2.5px solid rgba(192,132,252,0.9);
  animation: hl-ring 0.2s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
.tdot.highlight .tdot-core {
  width: 48px; height: 48px;
  background: rgba(192,132,252,0.8);
  animation: hl-core 0.2s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes hl-outer { from { transform:translate(-50%,-50%) scale(0.7); } to { transform:translate(-50%,-50%) scale(1); } }
@keyframes hl-ring  { from { transform:translate(-50%,-50%) scale(0.6); } to { transform:translate(-50%,-50%) scale(1); } }
@keyframes hl-core  { from { transform:translate(-50%,-50%) scale(0.5); } to { transform:translate(-50%,-50%) scale(1); } }

/* DIM */
.tdot.dim .tdot-outer {
  width: 70px; height: 70px;
  border: 1px solid rgba(255,255,255,0.04);
  animation: none; opacity: 0.25;
}
.tdot.dim .tdot-ring {
  width: 48px; height: 48px;
  border: 1px solid rgba(255,255,255,0.06);
  animation: none;
}
.tdot.dim .tdot-core {
  width: 26px; height: 26px;
  background: rgba(255,255,255,0.05);
  animation: none;
}

/* WINNER */
.tdot.winner .tdot-outer {
  width: 130px; height: 130px;
  border: 2px solid rgba(168,85,247,0.8);
  animation: win-outer 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards;
  box-shadow: 0 0 40px rgba(124,58,237,0.5);
}
.tdot.winner .tdot-ring {
  width: 90px; height: 90px;
  border: 3px solid var(--purple3);
  animation: win-ring 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards, win-ring-pulse 1.2s 0.7s ease-in-out infinite;
  box-shadow: 0 0 24px rgba(192,132,252,0.6);
}
.tdot.winner .tdot-core {
  width: 56px; height: 56px;
  background: var(--purple2);
  animation: win-core 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards;
  box-shadow: 0 0 20px rgba(168,85,247,0.8);
}
.tdot.winner::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  width: 140px; height: 140px;
  transform: translate(-50%,-50%);
  border: 1.5px solid rgba(192,132,252,0.4);
  border-radius: 50%;
  animation: win-ripple 1.2s ease-out infinite;
}
@keyframes win-outer { from { transform:translate(-50%,-50%) scale(0.4); opacity:0; } to { transform:translate(-50%,-50%) scale(1); opacity:1; } }
@keyframes win-ring  { from { transform:translate(-50%,-50%) scale(0.3); } to { transform:translate(-50%,-50%) scale(1); } }
@keyframes win-core  { from { transform:translate(-50%,-50%) scale(0.2); } to { transform:translate(-50%,-50%) scale(1); } }
@keyframes win-ring-pulse {
  0%,100% { transform:translate(-50%,-50%) scale(1); }
  50% { transform:translate(-50%,-50%) scale(1.08); }
}
@keyframes win-ripple {
  from { transform:translate(-50%,-50%) scale(0.9); opacity:0.7; }
  to   { transform:translate(-50%,-50%) scale(2.8); opacity:0; }
}

/* LOSER */
.tdot.loser .tdot-outer { display: none; }
.tdot.loser .tdot-ring {
  width: 44px; height: 44px;
  border: 1px solid rgba(255,255,255,0.05);
  animation: none; opacity: 0.15;
}
.tdot.loser .tdot-core {
  width: 22px; height: 22px;
  background: rgba(255,255,255,0.04);
  animation: none;
}

/* Status bar */
.play-status-bar {
  position: relative;
  z-index: 10;
  width: 100%;
  flex-shrink: 0;
  min-height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px 24px;
  padding-bottom: calc(var(--sab) + 8px);
}
.status-text {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--muted2);
  text-align: center;
  transition: color 0.3s;
}
.status-text.active { color: var(--purple3); }

.wait-bar-wrap {
  position: absolute;
  bottom: calc(var(--sab)); left: 20px; right: 20px;
  height: 2px;
  background: var(--surface2);
  border-radius: 2px;
  display: none;
}
.wait-bar-wrap.show { display: block; }
.wait-bar-fill {
  height: 100%;
  background: var(--purple);
  border-radius: 2px;
  transition: none;
}

/* ===================== RESULT ===================== */
#result-screen {
  background: radial-gradient(ellipse at 50% 40%, rgba(124,58,237,0.12) 0%, transparent 65%), var(--bg);
  justify-content: center;
  padding: calc(var(--sat) + 24px) 28px calc(var(--sab) + 24px);
  gap: 0;
  overflow-y: auto;
}
.result-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  max-width: 400px;
  gap: 0;
}
.result-eyebrow {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted2);
  text-align: center;
  margin-bottom: 12px;
}
.result-headline {
  font-family: 'Syne', sans-serif;
  font-size: clamp(48px, 14vw, 76px);
  font-weight: 800;
  letter-spacing: -2px;
  line-height: 1;
  text-align: center;
  color: var(--text);
  animation: res-in 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes res-in {
  from { transform:scale(0.55); opacity:0; }
  to   { transform:scale(1);    opacity:1; }
}
.result-pack-tag {
  margin-top: 12px;
  padding: 5px 14px;
  border-radius: 99px;
  border: 1.5px solid rgba(168,85,247,0.3);
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--purple3);
}
.result-card {
  margin-top: 24px;

  background: var(--surface);
  border: 1.5px solid rgba(255,255,255,0.09);

  padding: 24px 22px;

}
@keyframes card-up {
  from { transform:translateY(20px); opacity:0; }
  to   { transform:translateY(0);    opacity:1; }
}
.result-card-type {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--purple3);
  margin-bottom: 12px;
}
.result-card-text {
  font-family: 'Syne', sans-serif;

}
.no-card {

.result-btns {

/* ======================================================

====================================================== */
function save() {
  try {
    localStorage.setItem('wn2_dares', JSON.stringify(customDares));
    localStorage.setItem('wn2_truths', JSON.stringify(customTruths));
  } catch(e){}
}
function load() {
  try {
    const d = localStorage.getItem('wn2_dares');
    const t = localStorage.getItem('wn2_truths');
    if(d) customDares = JSON.parse(d);
    if(t) customTruths = JSON.parse(t);
  } catch(e){}
}

/* ======================================================
   NAVIGATION
====================================================== */
function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.toggle('hidden', s.id !== id));
  if (id === 'onboarding') renderPacks();
  if (id === 'custom-screen') renderCustomList();
  if (id === 'play-screen') initPlay();
  if (id === 'onboarding' || id === 'splash') {
    cancelAnimationFrame(fluidRaf);
    const fc = document.getElementById('fluid-canvas');
    fc.classList.remove('show');
    // remove old touch listeners
    const ta = document.getElementById('touch-area');
    ta.removeEventListener('touchstart', onTouchStart);
    ta.removeEventListener('touchend', onTouchEnd);
    ta.removeEventListener('touchcancel', onTouchEnd);
  }
}

/* ======================================================
   ONBOARDING
====================================================== */
function setType(type, el) {
  selectedType = type;
  document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderPacks();
}

function renderPacks() {
  const scroll = document.getElementById('packScroll');
  const sections = [...new Set(PACKS.map(p => p.section))];
  let html = '';
  sections.forEach(sec => {
    html += `<div class="pack-section-label">${sec}</div>`;
    PACKS.filter(p => p.section === sec).forEach(p => {
      const sel = selectedPackId === p.id;
      const count = selectedType === 'both' ? p.truths.length + p.dares.length
                  : selectedType === 'truths' ? p.truths.length : p.dares.length;
      html += `<div class="pack-card ${sel?'selected':''}" style="--pack-color:${p.color}" onclick="selectPack('${p.id}')">
        <div class="pack-card-dot"></div>
        <div class="pack-card-body">
          <div class="pack-name">${p.name}</div>
          <div class="pack-desc">${p.desc} · ${count} cards</div>
        </div>
        <div class="pack-check">✓</div>
      </div>`;
    });
  });
  const totalCustom = customDares.length + customTruths.length;
  if (totalCustom > 0) {
    html += `<div class="pack-section-label">Your Cards</div>
    <div class="pack-card ${selectedPackId==='custom'?'selected':''}" style="--pack-color:#94a3b8" onclick="selectPack('custom')">
      <div class="pack-card-dot"></div>
      <div class="pack-card-body">
        <div class="pack-name">My Custom Cards</div>
        <div class="pack-desc">${customDares.length} dares, ${customTruths.length} truths · ${totalCustom} total</div>
      </div>
      <div class="pack-check">✓</div>
    </div>`;
  }
  scroll.innerHTML = html;
  updateStartBtn();
}

function selectPack(id) {
  selectedPackId = id;
  renderPacks();
}

function updateStartBtn() {
  const btn = document.getElementById('startBtn');
  if (selectedPackId) {
    btn.disabled = false;
    btn.textContent = "Let's play";
  } else {
    btn.disabled = true;
    btn.textContent = 'Select a pack to continue';
  }
}

function startGame() {
  if (!selectedPackId) return;
  goTo('play-screen');
}

/* ======================================================
   CUSTOM
====================================================== */
function setCType(t, el) {
  currentCType = t;
  document.querySelectorAll('.type-tab-sm').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderCustomList();
}
function addCustom() {
  const inp = document.getElementById('csInput');
  const val = inp.value.trim();
  if (!val) return;
  if (currentCType === 'dare') customDares.push(val);
  else customTruths.push(val);
  save();
  inp.value = '';
  renderCustomList();
  renderPacks();
}
function deleteCustom(type, i) {
  if (type === 'dare') customDares.splice(i,1);
  else customTruths.splice(i,1);
  save();
  renderCustomList();
  renderPacks();
}
function renderCustomList() {
  const list = document.getElementById('csList');
  const arr = currentCType === 'dare' ? customDares : customTruths;
  if (!arr.length) {
    list.innerHTML = `<div class="cs-empty">Nothing added yet.<br>Type one below and hit +</div>`;
    return;
  }
  list.innerHTML = arr.map((item,i) => `
    <div class="cs-item">
      <span class="cs-item-text">${escHtml(item)}</span>
      <button class="cs-del" onclick="deleteCustom('${currentCType}',${i})">×</button>
    </div>`).join('');
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ======================================================
   PLAY INIT
====================================================== */
function initPlay() {
  gameState = 'idle';
  clearAllTimers();
  activeTouches = {};

  const area = document.getElementById('touch-area');
  area.querySelectorAll('.tdot').forEach(d => d.remove());
  document.getElementById('touchHint').style.opacity = '1';
  setStatus('', false);
  clearWaitBar();

  const pack = getPack();
  document.getElementById('playPackName').textContent = pack ? pack.name.toUpperCase() : 'CUSTOM';

  startFluid();

  area.addEventListener('touchstart', onTouchStart, { passive: false });
  area.addEventListener('touchend', onTouchEnd, { passive: false });
  area.addEventListener('touchcancel', onTouchEnd, { passive: false });
}

function getPack() {
  return selectedPackId === 'custom' ? null : PACKS.find(p => p.id === selectedPackId);
}

function getCards() {
  let truths = [], dares = [];
  if (selectedPackId === 'custom') {
    truths = [...customTruths];
    dares = [...customDares];
  } else {
    const p = getPack();
    if (p) { truths = [...p.truths]; dares = [...p.dares]; }
    truths = [...truths, ...customTruths];
    dares = [...dares, ...customDares];
  }
  if (selectedType === 'truths') dares = [];
  if (selectedType === 'dares') truths = [];
  return { truths, dares };
}

function pickCard() {
  const { truths, dares } = getCards();
  const all = [
    ...truths.map(t => ({ type:'truth', text:t })),
    ...dares.map(d => ({ type:'dare', text:d }))
  ];
  if (!all.length) return null;
  const pool = all.filter(c => !recentlyUsed.includes(c.text));
  const pick = (pool.length ? pool : all)[Math.floor(Math.random() * (pool.length || all.length))];
  recentlyUsed.push(pick.text);
  if (recentlyUsed.length > RECENT_AVOID) recentlyUsed.shift();
  return pick;
}

/* ======================================================
   TOUCH HANDLING
====================================================== */
function onTouchStart(e) {
  e.preventDefault();
  if (gameState === 'picking' || gameState === 'done') return;

  for (const t of e.changedTouches) {
    if (Object.keys(activeTouches).length >= 15) break;
    if (activeTouches[t.identifier]) continue;
    const rect = document.getElementById('touch-area').getBoundingClientRect();
    const x = t.clientX - rect.left;
    const y = t.clientY - rect.top;
    const dot = createDot(x, y);
    activeTouches[t.identifier] = { x, y, el: dot };
  }

  vibe(10);
  updateHint();

  if (gameState === 'waiting' && Object.keys(activeTouches).length > 0) {
    clearTimeout(waitTimer);
    clearWaitBar();
    gameState = 'idle';
  }
  if (gameState === 'idle' && Object.keys(activeTouches).length >= 2) {
    scheduleCdown();
  }
}

function onTouchEnd(e) {
  e.preventDefault();
  if (gameState === 'done') return;

  for (const t of e.changedTouches) {
    const id = t.identifier;
    if (!activeTouches[id]) continue;
    activeTouches[id].el.remove();
    delete activeTouches[id];
  }

  updateHint();
  const n = Object.keys(activeTouches).length;

  if (gameState === 'countdown' || gameState === 'picking') {
    clearTimeout(cdownScheduled);
    clearInterval(cdownTimer);
    if (n === 0) {
      resetPlay();
    } else {
      gameState = 'waiting';
      setStatus('Waiting 2s then we continue…', true);
      showWaitBar(2000);
      waitTimer = setTimeout(() => {
        if (Object.keys(activeTouches).length >= 1) startCdown();
        else resetPlay();
      }, 2000);
    }
  } else if (gameState === 'idle') {
    clearTimeout(cdownScheduled);
    cdownScheduled = null;
    if (n >= 2) scheduleCdown();
  }
}

function scheduleCdown() {
  clearTimeout(cdownScheduled);
  cdownScheduled = setTimeout(() => {
    if (Object.keys(activeTouches).length >= 2 && gameState === 'idle') startCdown();
  }, 500);
}

let dotColorIdx = 0;
const DOT_COLORS = ['#c084fc','#e879f9','#a78bfa','#f472b6','#60a5fa','#34d399','#fbbf24','#f97316',
                    '#fb7185','#a3e635','#22d3ee','#818cf8','#e2e8f0','#d4d4d8','#94a3b8'];

function createDot(x, y) {
  const area = document.getElementById('touch-area');
  const col = DOT_COLORS[dotColorIdx % DOT_COLORS.length];
  dotColorIdx++;

  const dot = document.createElement('div');
  dot.className = 'tdot idle';
  dot.style.left = x + 'px';
  dot.style.top = y + 'px';

  const outer = document.createElement('div'); outer.className = 'tdot-outer';
  outer.style.borderColor = col + '40';
  const ring = document.createElement('div'); ring.className = 'tdot-ring';
  ring.style.borderColor = col;
  const core = document.createElement('div'); core.className = 'tdot-core';
  core.style.background = col + '33';

  dot.appendChild(outer);
  dot.appendChild(ring);
  dot.appendChild(core);
  area.appendChild(dot);
  return dot;
}

function setDotState(id, state) {
  const t = activeTouches[id];
  if (!t || !t.el) return;
  t.el.className = `tdot ${state}`;
}

function updateHint() {
  const n = Object.keys(activeTouches).length;
  document.getElementById('touchHint').style.opacity = n > 0 ? '0' : '1';
  if (n === 0) setStatus('', false);
  else if (n === 1) setStatus('Need at least 2', false);
}

function setStatus(txt, active) {
  const el = document.getElementById('statusText');
  el.textContent = txt;
  el.className = 'status-text' + (active ? ' active' : '');
}

function resetPlay() {
  gameState = 'idle';
  clearAllTimers();
  dotColorIdx = 0;
  const area = document.getElementById('touch-area');
  area.querySelectorAll('.tdot').forEach(d => d.remove());
  activeTouches = {};
  document.getElementById('touchHint').style.opacity = '1';
  setStatus('', false);
  clearWaitBar();
}

/* ======================================================
   COUNTDOWN
====================================================== */
let cdownVal = 0;
function startCdown() {
  if (gameState === 'picking') return;
  gameState = 'countdown';
  clearWaitBar();
  cdownVal = 3;

  Object.keys(activeTouches).forEach(id => setDotState(id, 'spinning'));
  setStatus(`${cdownVal}`, true);
  vibe([40,40,40]);

  cdownTimer = setInterval(() => {
    cdownVal--;
    if (cdownVal <= 0) {
      clearInterval(cdownTimer);
      setStatus('', false);
      beginPick();
    } else {
      setStatus(`${cdownVal}`, true);
      vibe(30);
    }
  }, 1000);
}

/* ======================================================
   PICK ANIMATION
====================================================== */
function beginPick() {
  gameState = 'picking';
  const ids = Object.keys(activeTouches);
  if (!ids.length) { resetPlay(); return; }
  if (ids.length === 1) { revealWinner(ids[0], ids); return; }

  const winner = ids[Math.floor(Math.random() * ids.length)];
  let step = 0;
  let curIdx = 0;
  const base = 110;
  const total = 20 + ids.length * 3;
  const doFakeout = Math.random() < 0.30;
  let fakeIdx = -1;
  if (doFakeout) {
    const nonW = ids.filter(id => id !== winner);
    fakeIdx = ids.indexOf(nonW[Math.floor(Math.random() * nonW.length)]);
  }

  function step_fn() {
    if (!activeTouches[ids[0]]) return;
    ids.forEach(id => setDotState(id, 'dim'));

    let showIdx;
    if (doFakeout && step === total - 5) { showIdx = fakeIdx; }
    else if (doFakeout && step === total - 4) { showIdx = fakeIdx; }
    else if (doFakeout && step >= total - 3) { showIdx = ids.indexOf(winner); }
    else if (step >= total - 3) { showIdx = ids.indexOf(winner); }
    else { curIdx = (curIdx + 1) % ids.length; showIdx = curIdx; }

    setDotState(ids[showIdx], 'highlight');
    vibe(6);
    step++;

    if (step >= total) {
      setTimeout(() => revealWinner(winner, ids), 200);
      return;
    }

    let delay = base;
    if (step > total * 0.5)  delay = base * 1.5;
    if (step > total * 0.7)  delay = base * 2.5;
    if (step > total * 0.85) delay = base * 4;
    if (doFakeout && step >= total-5 && step <= total-3) delay = base * 6;

    setTimeout(step_fn, delay);
  }
  step_fn();
}

function revealWinner(winnerId, allIds) {
  gameState = 'done';
  vibe([0,40,80,40,160]);
  allIds.forEach(id => setDotState(id, id === winnerId ? 'winner' : 'loser'));
  setStatus('', false);
  setTimeout(() => showResult(allIds.length), 1500);
}

/* ======================================================
   RESULT
====================================================== */
function showResult(playerCount) {
  launchConfetti();
  const card = pickCard();
  document.getElementById('resultEyebrow').textContent = `Picked from ${playerCount} ${playerCount===1?'finger':'fingers'}`;
  const pack = getPack();
  document.getElementById('resultPackTag').textContent = pack ? pack.name : 'Custom';

  const slot = document.getElementById('cardSlot');
  if (card) {
    slot.innerHTML = `<div class="result-card">
      <div class="result-card-type">${card.type === 'truth' ? 'Truth' : 'Dare'}</div>
      <div class="result-card-text">${escHtml(card.text)}</div>
    </div>`;
  } else {
    slot.innerHTML = `<p class="no-card">No cards in this pack.<br>Add some custom ones first.</p>`;
  }
  goTo('result-screen');

  const ta = document.getElementById('touch-area');
  ta.removeEventListener('touchstart', onTouchStart);
  ta.removeEventListener('touchend', onTouchEnd);
  ta.removeEventListener('touchcancel', onTouchEnd);
}

function playAgain() { goTo('play-screen'); }

/* ======================================================
   WAIT BAR
====================================================== */
function showWaitBar(dur) {
  const wrap = document.getElementById('waitBarWrap');
  const fill = document.getElementById('waitBarFill');
  wrap.classList.add('show');
  fill.style.transition = 'none';
  fill.style.width = '100%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    fill.style.transition = `width ${dur}ms linear`;
    fill.style.width = '0%';
  }));
}
function clearWaitBar() {
  document.getElementById('waitBarWrap').classList.remove('show');
  document.getElementById('waitBarFill').style.width = '0%';
}
function clearAllTimers() {
  clearTimeout(waitTimer);
  clearTimeout(cdownScheduled);
  clearInterval(cdownTimer);
  waitTimer = cdownScheduled = cdownTimer = null;
}

/* ======================================================
   VIBRATION
====================================================== */
function vibe(p) {
  try { if(navigator.vibrate) navigator.vibrate(p); } catch(e){} 
}

/* ======================================================
   FLUID BACKGROUND
====================================================== */
let fluidRaf = null;
function startFluid() {
  cancelAnimationFrame(fluidRaf);
  const canvas = document.getElementById('fluid-canvas');
  const ctx = canvas.getContext('2d');
  let W = canvas.width = window.innerWidth;
  let H = canvas.height = window.innerHeight;

  const blobs = [];
  for (let i = 0; i < 12; i++) {
    blobs.push({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random()-0.5)*0.35, vy: (Math.random()-0.5)*0.35,
      r: 100 + Math.random() * 140,
      a: 0.018 + Math.random() * 0.022,
      hue: 250 + Math.random() * 60,
      phase: Math.random() * Math.PI * 2
    });
  }

  let t = 0;
  function tick() {
    fluidRaf = requestAnimationFrame(tick);
    ctx.clearRect(0,0,W,H);
    t += 0.008;
    blobs.forEach(b => {
      b.x += b.vx + Math.sin(t + b.phase) * 0.25;
      b.y += b.vy + Math.cos(t * 0.8 + b.phase) * 0.25;
      if (b.x < -b.r) b.x = W+b.r;
      if (b.x > W+b.r) b.x = -b.r;
      if (b.y < -b.r) b.y = H+b.r;
      if (b.y > H+b.r) b.y = -b.r;
      const g = ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
      g.addColorStop(0, `hsla(${b.hue},55%,65%,${b.a})`);
      g.addColorStop(1, `hsla(${b.hue},55%,65%,0)`);
      ctx.beginPath();
      ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
      ctx.fillStyle = g;
      ctx.fill();
    });
  }
  canvas.classList.add('show');
  tick();
}

/* ======================================================
   CONFETTI
====================================================== */
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const cols = ['#c084fc','#a855f7','#7c3aed','#f472b6','#e879f9','#fbbf24','#e2e8f0'];
  const pieces = Array.from({length:90},()=>({
    x: Math.random() * canvas.width,
    y: -10 - Math.random() * 80,
    w: 5 + Math.random() * 7,
    h: 2 + Math.random() * 4,
    rot: Math.random()*Math.PI*2,
    vx: (Math.random()-0.5)*5,
    vy: 2.5 + Math.random() * 4,
    vr: (Math.random()-0.5)*0.18,
    color: cols[Math.floor(Math.random()*cols.length)],
    alpha: 1
  }));
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let any = false;
    pieces.forEach(p => {
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr;
      if(p.y < canvas.height+20) any=true; else p.alpha = Math.max(0,p.alpha-0.025);
      if(p.alpha <= 0) return;
      ctx.save();
      ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    if(any || pieces.some(p=>p.alpha>0)) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

/* ======================================================
   SERVICE WORKER + INIT
====================================================== */
// =============================================
// SERVICE WORKER — instant offline registration
// =============================================
if ('serviceWorker' in navigator) {
  // Register immediately, don't wait for load event (faster on repeat visits)
  navigator.serviceWorker.register('./sw.js', { scope: './' })
    .then(reg => {
      // If there's a new SW waiting, activate it immediately
      if (reg.waiting) reg.waiting.postMessage('skipWaiting');
      reg.addEventListener('updatefound', () => {
        const newSW = reg.installing;
        newSW.addEventListener('statechange', () => {
          if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
            newSW.postMessage('skipWaiting');
          }
        });
      });
    })
    .catch(() => {});
  // When SW takes control, reload once to use cached version
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!refreshing) { refreshing = true; }
  });
}
load();
renderPacks();
